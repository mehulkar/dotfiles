# https://starship.rs/config/

command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$custom\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 2000
format = " [$duration]($style)"

[git_status]
conflicted = "⚔ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[time]
disabled = false
format = "[$time]($style) "
style = "dimmed"
